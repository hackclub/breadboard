# Orchard production compose — images only, zero local build.
# All images are prebuilt by .github/workflows/build-images.yml and pushed to GHCR.
services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: breadboard
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-breadboard}
      POSTGRES_DB: breadboard
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  editor-backend:
    image: ghcr.io/hackclub/breadboard-editor-backend:latest
    restart: unless-stopped
    environment:
      FRONTEND_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      VELXIO_PERSISTENT_BUILD_DIR: "1"
      IDF_CCACHE_ENABLE: "1"
    volumes:
      - editor-data:/app/data
      - editor-arduino:/root/.arduino15
      - editor-arduino-libs:/root/Arduino
      - editor-ccache:/var/cache/ccache
      - editor-builds:/tmp/velxio-builds
      - editor-idf-builds:/var/lib/velxio-build

  nextjs:
    image: ghcr.io/hackclub/breadboard:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://breadboard:${POSTGRES_PASSWORD:-breadboard}@postgres:5432/breadboard
      DATABASE_SSL: "false"
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}
      BETTER_AUTH_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      EDITOR_BACKEND_URL: http://editor-backend:8001
      NEXT_PUBLIC_EDITOR_BACKEND_URL: /api
      HACKCLUB_CLIENT_ID: ${HACKCLUB_CLIENT_ID:-}
      HACKCLUB_CLIENT_SECRET: ${HACKCLUB_CLIENT_SECRET:-}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_REGION: ${S3_REGION:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_PUBLIC_URL: ${S3_PUBLIC_URL:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
      GROWTHBOOK_CLIENT_KEY: ${GROWTHBOOK_CLIENT_KEY:-}
      GROWTHBOOK_API_HOST: ${GROWTHBOOK_API_HOST:-}
    depends_on:
      postgres:
        condition: service_healthy
      editor-backend:
        condition: service_started

volumes:
  pgdata:
  editor-data:
  editor-arduino:
  editor-arduino-libs:
  editor-ccache:
  editor-builds:
  editor-idf-builds:
